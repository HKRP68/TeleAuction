services:
  - type: web
    name: ipl-auction-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: SUPER_ADMIN_ID
        sync: false
      - key: WEBHOOK_URL
        sync: false
      - key: PORT
        value: 8080
